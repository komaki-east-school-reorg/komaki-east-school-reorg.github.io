name: Fetch Official News

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 0:00 UTC (9:00 JST)
  workflow_dispatch:        # 手動実行も可

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch official page and update JSON
        id: fetch
        run: |
          python3 .github/scripts/fetch_news.py
          echo "exit=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit if content changed
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update official news data [skip ci]"
            git push
          fi
